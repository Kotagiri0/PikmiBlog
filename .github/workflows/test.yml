name: Backend Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pikmi_blog_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # 1. Checkout репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js + npm cache (ВАЖНО для монорепо)
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: Pikmi-blog/backend/package-lock.json

      # 3. Установка зависимостей
      - name: Install dependencies
        working-directory: Pikmi-blog/backend
        run: npm ci

      # 4. Создание .env (без файлов в гите)
      - name: Setup environment variables
        working-directory: Pikmi-blog/backend
        run: |
          echo "DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/pikmi_blog_test?schema=public" > .env
          echo "NODE_ENV=test" >> .env

      # 5. Prisma
      - name: Generate Prisma Client
        working-directory: Pikmi-blog/backend
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: Pikmi-blog/backend
        run: npx prisma migrate deploy

      # 6. Запуск тестов
      - name: Run tests
        working-directory: Pikmi-blog/backend
        run: npm test
