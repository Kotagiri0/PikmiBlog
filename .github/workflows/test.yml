name: Backend Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pikmi_blog_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [20.x]  # Убрал 18.x для упрощения

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        # ВАЖНО: Уберите эту строку сначала для тестирования
        # cache-dependency-path: backend/package-lock.json

    - name: Debug file structure
      run: |
        echo "Checking for package-lock.json files:"
        find . -name "package-lock.json" -type f | head -20
        echo ""
        echo "Checking backend directory:"
        ls -la backend/ 2>/dev/null || echo "backend/ not found"
        echo ""
        echo "Checking blog-api directory:"
        ls -la blog-api/ 2>/dev/null || echo "blog-api/ not found"

    - name: Install dependencies
      working-directory: ./backend  # или ./blog-api
      run: npm ci

    - name: Setup environment
      working-directory: ./backend  # или ./blog-api
      run: |
        cp .env.test .env
        echo "DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/pikmi_blog_test?schema=public" >> .env

    # ... остальные шаги